services:

  haproxy:
    image: haproxy:2.9-alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "30MB"
    security_opt:
      - seccomp:unconfined
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - rinha

  api1:
    image: carlosportella16/rinha-2026:latest
    environment:
      - VECTORS_BIN=/data/references.bin
      - SERVER_PORT=9998
      - NPROBE=8
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/ready"]
      interval: 2s
      timeout: 3s
      retries: 60
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"
    security_opt:
      - seccomp:unconfined
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - rinha

  api2:
    image: carlosportella16/rinha-2026:latest
    environment:
      - VECTORS_BIN=/data/references.bin
      - SERVER_PORT=9998
      - NPROBE=8
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/ready"]
      interval: 2s
      timeout: 3s
      retries: 60
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"
    security_opt:
      - seccomp:unconfined
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - rinha

networks:
  rinha:
    driver: bridge
