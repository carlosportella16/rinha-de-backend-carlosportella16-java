services:

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "16MB"
    networks:
      - rinha

  api1:
    image: carlosportella16/rinha-2026:latest
    environment:
      - VECTORS_BIN=/data/references.bin
      - SERVER_PORT=9998
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9998/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "167MB"
    networks:
      - rinha

  api2:
    image: carlosportella16/rinha-2026:latest
    environment:
      - VECTORS_BIN=/data/references.bin
      - SERVER_PORT=9998
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9998/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "167MB"
    networks:
      - rinha

networks:
  rinha:
    driver: bridge
