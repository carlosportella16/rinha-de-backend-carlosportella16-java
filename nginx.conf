worker_processes 1;
error_log /dev/null;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100000;

    upstream backends {
        server api1:9998;
        server api2:9998;
        keepalive 64;
    }

    server {
        listen 9999;

        location / {
            proxy_pass         http://backends;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
        }
    }
}
