worker_processes 1;
error_log /dev/null;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100000;

    # Reduce proxy buffering overhead for small payloads (~500 byte request, ~50 byte response)
    proxy_buffering off;
    proxy_request_buffering off;

    upstream backends {
        server api1:9998;
        server api2:9998;
        keepalive 128;
        keepalive_requests 100000;
        keepalive_time 60s;
    }

    server {
        listen 9999 reuseport;

        location / {
            proxy_pass         http://backends;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_read_timeout 5s;
            proxy_send_timeout 5s;
            proxy_connect_timeout 1s;
        }
    }
}
